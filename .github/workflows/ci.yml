name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          NUXT_SESSION_SECRET: ci-placeholder-secret-at-least-32-chars-long
